site_name: pyconveyor
site_description: Deterministic YAML pipeline engine for structured LLM extraction
site_url: https://pyconveyor.readthedocs.io
repo_url: https://github.com/VictorGambarini/pyconveyor
repo_name: VictorGambarini/pyconveyor
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: quickstart.md
    - Concepts: concepts.md
  - Guides:
    - Step Types: guides/step-types.md
    - Validation Feedback: guides/validation-feedback.md
    - Expression Language: guides/expressions.md
    - Batch Processing: guides/batch.md
    - Hooks: guides/hooks.md
    - Vocabulary Fields: guides/vocab.md
    - Providers: guides/providers.md
    - LLM Utilities: guides/llm-utilities.md
    - Editor Setup: guides/editor-setup.md
  - Reference:
    - YAML Schema: reference/schema.md
    - CLI Reference: reference/cli.md
  - Examples: examples.md
